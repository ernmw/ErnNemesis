name: "Nemesis"
description: "Feinde, die dich niederstrecken, werden stärker."

missingFollowerDetectionUtilError: "FEHLER! Du musst das Follower Detection Util installieren."

modSettingsAdminTitle: "Admin"
disable_name: "Mod deaktivieren"
disable_description: "Schaltet die Mod aus."
debugMode_name: "Debug-Modus"
debugMode_description: "Aktiviert ausführliche Protokollierung. Bitte aktiviere dies und hole dir das Protokoll, wenn du ein Problem melden möchtest."

modSettingsGameplayTitle: "Spielverhalten"
healthScaling_name: "Lebenspunkte-Skalierung"
healthScaling_description: "Feinde erhalten pro Tötung so viele Lebenspunkte."
fatigueScaling_name: "Ausdauer-Skalierung"
fatigueScaling_description: "Feinde erhalten pro Tötung so viel Ausdauer."
magickaScaling_name: "Magicka-Skalierung"
magickaScaling_description: "Feinde erhalten pro Tötung so viel Magicka."
attributeScaling_name: "Attribut-Skalierung"
attributeScaling_description: "Feinde erhalten pro Tötung diese Anzahl an Attributpunkten, verteilt nach Klassenpräferenzen."
skillScaling_name: "Fertigkeiten-Skalierung"
skillScaling_description: "Feinde erhalten pro Tötung diese Anzahl an Fertigkeitspunkten in ihren Klassenfertigkeiten. Gilt nicht für Kreaturen."

levelScaling_name: "Stufen-Skalierung"
levelScaling_description: "Erhöht die Feindstufe pro Tod. Dies verändert nur die Stufe, nicht Fertigkeiten oder Attribute."

spellScaling_name: "Zauber-Lernen"
spellScaling_description: "Magisch begabte Feinde lernen pro Tod diese Anzahl zusätzlicher zufälliger Zauber. Gilt nicht für Kreaturen."

ignoreNPCBlocklist_name: "Akteur-Sperrliste ignorieren"
ignoreNPCBlocklist_description: "Schaltet die Sperrliste aus. Alle Akteure sind zulässig."

showCrown_name: "Krone anzeigen"
showCrown_description: "Zeigt eine Krone über NPCs an, die dich getötet haben."

neglectDayPenalty_name: "Vernachlässigungs-Skalierung"
neglectDayPenalty_description: "Wenn du die Rache vernachlässigst, werden Nemesis-Feinde alle so viele Spieltage stärker. Auf 0 setzen zum Deaktivieren."

modSettingsEquipmentTitle: "Ausrüstung"
weaponScaling_name: "Waffen-Skalierung"
weaponScaling_description: "Feinde erhalten pro Tötung bessere Waffen. Dies entspricht ungefähr einer Erhöhung des Goldwerts pro Tötung. Auf 0 setzen zum Deaktivieren."
armorScaling_name: "Rüstungs-Skalierung"
armorScaling_description: "Feinde erhalten pro Tötung bessere Rüstung. Dies entspricht ungefähr einer Erhöhung des Goldwerts pro Tötung. Auf 0 setzen zum Deaktivieren."
consumableScaling_name: "Verbrauchsgüter-Skalierung"
consumableScaling_description: "Feinde erhalten pro Tötung zusätzliche Tränke oder Schriftrollen (max. 3). Dies entspricht ungefähr einer Erhöhung des Goldwerts pro Tötung. Gilt nicht für Kreaturen."
ignoreItemAllowlist_name: "Gegenstands-Erlaubnisliste ignorieren"
ignoreItemAllowlist_description: "Schaltet die Erlaubnisliste für Gegenstände aus. Einzigartige Gegenstände können bei Feinden erscheinen."

upgradeStrategy_name: "Verbesserungsstrategie"
upgradeStrategy_description: "Verbesserte Ausrüstung kann vergänglich sein (wird bei Tod gelöscht) oder dauerhaft. Bei dauerhafter Wahl wird die ursprüngliche Ausrüstung gelöscht, falls sie auf der Erlaubnisliste erscheint."
ephemeral: "Vergänglich"
permanent: "Dauerhaft"


revengeAchievementName: "Tosender Rachefeldzug"
revengeAchievementDescription: "Töte sechs Nemesis-Feinde."
