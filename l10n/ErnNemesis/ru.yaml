name: "Nemesis"
description: "Враги, которые убивают вас, становятся сильнее."

missingFollowerDetectionUtilError: "ОШИБКА! Вам нужно установить Follower Detection Util."

modSettingsAdminTitle: "Администрирование"
disable_name: "Отключить мод"
disable_description: "Выключает мод."
debugMode_name: "Режим отладки"
debugMode_description: "Включает подробное журналирование. Пожалуйста, включите эту опцию и приложите лог, если собираетесь сообщить о проблеме."

modSettingsGameplayTitle: "Геймплей"
healthScaling_name: "Прирост здоровья"
healthScaling_description: "Враги получают столько здоровья за каждое убийство."
fatigueScaling_name: "Прирост выносливости"
fatigueScaling_description: "Враги получают столько выносливости за каждое убийство."
magickaScaling_name: "Прирост магии"
magickaScaling_description: "Враги получают столько магии за каждое убийство."
attributeScaling_name: "Прирост атрибутов"
attributeScaling_description: "Враги получают это количество очков атрибутов за каждое убийство, распределяемых согласно предпочтениям класса."
skillScaling_name: "Прирост навыков"
skillScaling_description: "Враги получают это количество очков классовых навыков за каждое убийство. Не относится к существам."

levelScaling_name: "Прирост уровня"
levelScaling_description: "Повышает уровень врага за каждую смерть. Изменяется только уровень, а не навыки или атрибуты."

spellScaling_name: "Изучение заклинаний"
spellScaling_description: "Враги, склонные к магии, изучают это количество дополнительных случайных заклинаний за каждую смерть. Не относится к существам."

ignoreNPCBlocklist_name: "Игнорировать чёрный список персонажей"
ignoreNPCBlocklist_description: "Отключает чёрный список. Все персонажи становятся подходящими."

showCrown_name: "Показывать корону"
showCrown_description: "Отображает корону над NPC, которые вас убили."

neglectDayPenalty_name: "Прирост за бездействие"
neglectDayPenalty_description: "Если вы не мстите, немезиды усиливаются раз в указанное количество игровых дней. Установите 0, чтобы отключить."

modSettingsEquipmentTitle: "Снаряжение"
weaponScaling_name: "Прирост оружия"
weaponScaling_description: "Враги получают более качественное оружие за каждое убийство. Это примерно соответствует росту стоимости в золоте за убийство. Установите 0, чтобы отключить."
armorScaling_name: "Прирост брони"
armorScaling_description: "Враги получают более качественную броню за каждое убийство. Это примерно соответствует росту стоимости в золоте за убийство. Установите 0, чтобы отключить."
consumableScaling_name: "Прирост расходников"
consumableScaling_description: "Враги получают дополнительные зелья или свитки за каждое убийство (максимум 3). Это примерно соответствует росту стоимости в золоте за убийство. Не относится к существам."
ignoreItemAllowlist_name: "Игнорировать белый список предметов"
ignoreItemAllowlist_description: "Отключает белый список предметов. У врагов могут появляться уникальные предметы."

upgradeStrategy_name: "Стратегия улучшения"
upgradeStrategy_description: "Улучшенное снаряжение может быть временным (удаляется после смерти) или постоянным. При постоянном варианте исходное снаряжение будет удалено, если оно есть в белом списке."
ephemeral: "Временное"
permanent: "Постоянное"


revengeAchievementName: "Неистовая жажда мести"
revengeAchievementDescription: "Убейте шесть немезид."
