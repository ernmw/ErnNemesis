modSettingsAdminTitle: "Администрирование"
disable_name: "Отключить мод"
disable_description: "Отключить мод."
debugMode_name: "Режим отладки"
debugMode_description: "Включить подробное журналирование. Включите этот режим и приложите журнал, если собираетесь сообщить о проблеме."

modSettingsGameplayTitle: "Игровой процесс"
healthScaling_name: "Масштабирование здоровья"
healthScaling_description: "За каждое убийство враги получают столько дополнительного здоровья."
fatigueScaling_name: "Масштабирование запаса сил"
fatigueScaling_description: "За каждое убийство враги получают столько дополнительного запаса сил."
magickaScaling_name: "Масштабирование магии"
magickaScaling_description: "За каждое убийство враги получают столько дополнительной магии."
attributeScaling_name: "Масштабирование характеристик"
attributeScaling_description: "За каждое убийство враги получают указанное количество очков характеристик, распределённых в соответствии с предпочтениями их класса."
skillScaling_name: "Масштабирование навыков"
skillScaling_description: "За каждое убийство враги получают указанное количество очков навыков своих классовых навыков. Не применяется к существам."

levelScaling_name: "Масштабирование уровня"
levelScaling_description: "Повышает уровень врага после каждой смерти. Изменяется только уровень, но не навыки и характеристики."

weaponScaling_name: "Масштабирование оружия"
weaponScaling_description: "За каждое убийство враги получают более качественное оружие. Это примерно соответствует увеличению стоимости оружия в золоте за каждое убийство. Не применяется к существам."
armorScaling_name: "Масштабирование брони"
armorScaling_description: "За каждое убийство враги получают более качественную броню. Это примерно соответствует увеличению стоимости брони в золоте за каждое убийство. Не применяется к существам."
consumableScaling_name: "Масштабирование расходников"
consumableScaling_description: "За каждое убийство враги получают дополнительные зелья или свитки (максимум 3). Это примерно соответствует увеличению стоимости добычи в золоте за каждое убийство. Не применяется к существам."

spellScaling_name: "Изучение заклинаний"
spellScaling_description: "Враги, склонные к магии, изучают указанное количество дополнительных случайных заклинаний после каждой смерти. Не применяется к существам."
