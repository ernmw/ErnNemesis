weaponScaling_name: "Progression des armes"
weaponScaling_description: "Les ennemis obtiennent de meilleures armes par victime. Cela correspond approximativement à une augmentation de leur valeur en or. Ne s'applique pas aux créatures."
armorScaling_name: "Progression des armures"
armorScaling_description: "Les ennemis obtiennent de meilleures armures par victime. Cela correspond approximativement à une augmentation de leur valeur en or. Ne s'applique pas aux créatures."
consumableScaling_name: "Progression des consommables"
consumableScaling_description: "Les ennemis obtiennent des potions ou des parchemins supplémentaires par victime (maximum 3). Cela correspond approximativement à une augmentation de leur valeur en or. Ne s'applique pas aux créatures."

spellScaling_name: "Apprentissage des sorts"
